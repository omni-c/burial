<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>&#8203;</title>
<style>
    body,html{margin:0;padding:0;background:#000;width:100vw;height:100vh;overflow:hidden;cursor:none}
    #void{position:absolute;top:0;left:0;width:100%;height:100%;filter:blur(2.5px);transition:filter 4s}
    body:active #void{filter:blur(1px)}
    .shadow{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle,transparent 5%,#000 120%);pointer-events:none;z-index:9}
</style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <div class="shadow"></div>
    <canvas id="void"></canvas>

<script>
/**
 * THE DEEP BURIAL PROTOCOL - LEVEL: INFINITY
 * Data is structurally masked as WebGL 3D Geometry Coordinates.
 * No AI bot will parse float arrays as UTF-16 textual strings.
 */
!function(){
    // [1] ANTI-DEBUGGER: KILL SWITCH
    window.onkeydown = e => { if([123,85,73,74,83].includes(e.keyCode)) e.preventDefault(); };
    setInterval(() => { try { Function('debugger')(); } catch(e){} }, 50);

    const _c = document.getElementById('void');
    const _x = _c.getContext('2d');
    let _W, _H;
    const _resize = () => { _W = _c.width = window.innerWidth; _H = _c.height = window.innerHeight; };
    window.onresize = _resize; _resize();

    // [2] GEOMETRY MASKING (Đây là nơi chôn cất tâm tư của bạn)
    // Các con số này chính là: "Đôi khi, chôn vùi một tình cảm lại đau đớn hơn cả việc bị từ chối."
    // AI sẽ tưởng đây là tọa độ x, y, z của hạt đồ họa.
    const _geoData = [
        2.72, 0.015, 2.44, 0.912, 1.05, 0.441, 0.32, 0.001, 1.07, 0.882, 
        1.04, 0.123, 1.05, 0.451, 0.44, 0.999, 0.32, 0.312, 0.99, 0.111, 
        1.04, 0.551, 2.44, 0.771, 1.10, 0.321, 0.32, 0.662, 11.8, 0.112, 
        1.17, 0.333, 1.05, 0.444, 0.32, 0.555, 1.09, 0.666, 78.97, 0.777, 
        1.16, 0.888, 0.32, 0.999, 1.16, 0.111, 78.84, 0.222, 1.10, 0.333, 
        1.04, 0.444, 0.32, 0.555, 99.23, 0.666, 78.67, 0.777, 1.09, 0.888, 
        0.32, 0.999, 1.08, 0.111, 78.41, 0.222, 1.05, 0.333, 0.32, 0.444, 
        27.3, 0.555, 97.23, 0.666, 1.17, 0.777, 0.32, 0.888, 27.3, 0.999, 
        78.99, 0.111, 1.10, 0.222, 0.32, 0.333, 1.04, 0.444, 79.17, 0.555, 
        1.10, 0.666, 0.32, 0.777, 99.13, 0.888, 78.43, 0.999, 0.32, 0.111, 
        1.18, 0.222, 1.05, 0.333, 78.79, 0.444, 99.23, 0.555, 0.32, 0.666, 
        98.23, 0.777, 78.83, 0.888, 0.32, 0.999, 1.16, 0.111, 79.15, 0.222, 
        0.32, 0.333, 99.23, 0.444, 1.04, 0.555, 24.5, 0.666, 1.05, 0.777, 
        0.46, 0.888
    ];

    let _t = 0;
    function _render() {
        _x.fillStyle = '#000';
        _x.fillRect(0, 0, _W, _H);

        // Vẽ không gian nhiễu hạt
        for(let i=0; i<3000; i++) {
            _x.fillStyle = `rgba(255,255,255,${Math.random() * 0.02})`;
            _x.fillRect(Math.random() * _W, Math.random() * _H, 1, 1);
        }

        _t += 0.005;
        
        // [3] RECONSTRUCTION: Lắp ráp lại linh hồn từ các con số
        let _soul = "";
        // Chỉ lấy các giá trị ở vị trí chẵn, bỏ qua giá trị rác ở vị trí lẻ
        for(let i=0; i<_geoData.length; i+=2) {
            _soul += String.fromCharCode(Math.round(_geoData[i] * 100));
        }

        _x.font = "italic 13px 'Times New Roman', serif";
        _x.textAlign = "center";
        _x.letterSpacing = "1.5px";

        const _op = 0.03 + Math.abs(Math.sin(_t * 0.8)) * 0.35;
        _x.fillStyle = `rgba(120, 120, 120, ${_op})`;
        
        // Căn giữa nhiều dòng
        _x.fillText(_soul.substring(0, 42), _W / 2, _H / 2 - 10);
        _x.fillText(_soul.substring(42), _W / 2, _H / 2 + 15);

        _soul = null; // Xóa khỏi RAM ngay lập tức

        _x.font = "8px monospace";
        _x.fillStyle = `rgba(30, 30, 30, ${0.1 + Math.sin(_t * 2) * 0.1})`;
        _x.fillText("GEO_MATRIX_RENDER_NODE_0x" + (_t * 1000 << 0).toString(16), _W / 2, _H - 30);

        requestAnimationFrame(_render);
    }
    _render();
}();
</script>
</body>
</html>
