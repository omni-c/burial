<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>...</title>
    <style>
        body, html {
            background-color: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas bao phủ toàn màn hình */
        #voidCanvas {
            cursor: none;
            filter: blur(1.5px); /* Mờ mờ ảo ảo mặc định */
            transition: filter 2s ease;
        }

        /* Khi chạm vào, độ mờ giảm nhẹ nhưng vẫn không rõ hẳn */
        body:active #voidCanvas {
            filter: blur(0.8px);
        }

        /* Lớp vignette che phủ tạo độ sâu */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <canvas id="voidCanvas"></canvas>

    <script>
        /**
         * HYBRID CIPHER LOGIC:
         * 1. Reverse the original heart-broken message.
         * 2. XOR encrypt with a rolling key 'VOID'.
         * 3. Inject random noise characters visually via Canvas.
         */
        const canvas = document.getElementById('voidCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        const secretText = "Yêu đơn phương là tự cầm dao đâm vào tim mình mỗi ngày.";
        const hybridCipherData = "§±µÆØ¶¼½¾¿×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿ"; // Mock symbols for display

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            // Xóa nền đen tuyệt đối
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            // Vẽ các hạt nhiễu (Grain)
            for (let i = 0; i < 5000; i++) {
                let x = Math.random() * width;
                let y = Math.random() * height;
                let opacity = Math.random() * 0.05;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fillRect(x, y, 1, 1);
            }

            // Cài đặt font chữ hoài cổ, mờ nhạt
            const fontSize = 11;
            ctx.font = `${fontSize}px serif`;
            ctx.textAlign = 'center';
            ctx.letterSpacing = "3px";

            // Vẽ khối mật mã tổ hợp lấp ló
            const rows = 35;
            const cols = 1;
            const time = Date.now() * 0.0005;

            for (let i = 0; i < rows; i++) {
                // Hiệu ứng "Thở" và lấp ló
                let opacity = 0.05 + Math.sin(time + i * 0.3) * 0.15;
                ctx.fillStyle = `rgba(40, 40, 40, ${opacity})`;
                
                // Tạo chuỗi ký tự hỗn hợp giả lập Hybrid Cipher
                let line = "";
                for(let j=0; j<40; j++) {
                    line += hybridCipherData[Math.floor(Math.random() * hybridCipherData.length)];
                }
                
                ctx.fillText(line, width / 2, (height / 2 - (rows * fontSize / 2)) + (i * fontSize * 1.5));
            }

            // Vẽ một dòng mã duy nhất rõ hơn "xíu xíu" ở trung tâm - nhưng đã bị XOR
            ctx.fillStyle = `rgba(50, 50, 50, ${0.1 + Math.sin(time) * 0.1})`;
            ctx.fillText("XOR_0x4A_REVERSED_BLOCK_LOCKED", width / 2, height / 2 + 100);

            requestAnimationFrame(draw);
        }

        // Theo dõi tương tác chuột/chạm để tạo hiệu ứng "Cào" nhẹ
        window.addEventListener('mousemove', (e) => {
            // Hiệu ứng này chỉ là đánh lừa thị giác, không làm rõ mã
            ctx.beginPath();
            ctx.arc(e.clientX, e.clientY, 50, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fill();
        });

        window.addEventListener('resize', init);
        window.onload = init;
    </script>
</body>
</html>
