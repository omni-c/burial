<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>&#8203;</title>
<style>
    /* Xóa sổ DOM, chặn tương tác vật lý */
    *{margin:0;padding:0;background:#000;overflow:hidden;cursor:none;user-select:none}
    canvas{width:100vw;height:100vh;filter:blur(2.5px);transition:filter 4s ease}
    body:active canvas{filter:blur(1px)}
    .void-mask{position:fixed;top:0;left:0;width:100vw;height:100vh;background:radial-gradient(circle,transparent 5%,#000 110%);pointer-events:none;z-index:9}
</style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">
    <div class="void-mask"></div>
    <canvas id="core"></canvas>

<script>
/**
 * THE SINGULARITY PROTOCOL
 * LEVEL: MILITARY-GRADE VIRTUALIZATION
 * Tác giả không còn nói bằng lời, tác giả giao tiếp bằng mã máy.
 */
!function(_w, _d){
    // [1] CƠ CHẾ PHÒNG THỦ CẤP THẤP
    _w.onkeydown = e => { if([123,85,73,74,83].includes(e.keyCode)) e.preventDefault(); };

    const _s = _d.getElementById("core"), _x = _s.getContext("2d");
    let _W, _H;
    const _rs = () => { _W = _s.width = _w.innerWidth; _H = _s.height = _w.innerHeight; };
    _w.onresize = _rs; _rs();

    // [2] KIẾN TRÚC MÁY ẢO TÙY CHỈNH (CUSTOM VIRTUAL MACHINE)
    // Opcodes: 
    // 0: SET_REGISTER
    // 1: ADD_REGISTER
    // 2: SUB_REGISTER
    // 3: PUSH_TO_GRAPHIC_BUFFER
    const _opcodes = [
        0, 182, 3, 0, 290, 3, 0, 131, 3, 0, 204, 3, 0, 208, 3, 0, 131, 3, 0, 207, 3, 
        0, 284, 3, 0, 209, 3, 0, 202, 3, 0, 131, 3, 0, 209, 3, 0, 224, 3, 0, 220, 3, 
        0, 131, 3, 0, 207, 3, 0, 224, 3, 0, 131, 3, 0, 198, 3, 0, 225, 3, 0, 216, 3, 
        0, 131, 3, 0, 215, 3, 0, 213, 3, 0, 260, 3, 0, 131, 3, 0, 207, 3, 0, 268, 3, 
        0, 204, 3, 0, 131, 3, 0, 215, 3, 0, 224, 3, 0, 209, 3, 0, 131, 3, 0, 209, 3, 
        0, 203, 3, 0, 252, 3, 0, 209, 3, 0, 131, 3, 0, 209, 3, 0, 203, 3, 0, 262, 3, 
        0, 215, 3, 0, 145, 3
    ];

    let _clock = 0, _lastTick = performance.now();

    function _executeVM() {
        // [3] BẪY THỜI GIAN VI MÔ (MICRO-TIMING SIDE-CHANNEL TRAP)
        // Nếu DevTools được mở, FPS sẽ sụt giảm dù chỉ vài phần nghìn giây.
        // Khi phát hiện độ trễ > 120ms, bộ nhớ RAM tự đánh sập toàn bộ Opcodes.
        let _now = performance.now();
        if (_now - _lastTick > 120) { _opcodes.length = 0; } 
        _lastTick = _now;
        
        try { Function("debugger")(); } catch(e){}

        // Kết xuất không gian nhiễu sóng
        _x.fillStyle = "#000"; 
        _x.fillRect(0, 0, _W, _H);
        for(let i = 0; i < 2500; i++) {
            _x.fillStyle = `rgba(255,255,255,${0.02 * Math.random()})`;
            _x.fillRect(Math.random() * _W, Math.random() * _H, 1, 1);
        }

        // CHU KỲ XỬ LÝ CỦA CPU ẢO
        let _reg = 0; 
        let _vram = ""; // Video RAM (chỉ lưu trữ tạm thời)
        
        for(let pc = 0; pc < _opcodes.length; pc += 2) {
            let _cmd = _opcodes[pc], _val = _opcodes[pc+1];
            
            // Xử lý mã lệnh (Instruction Decoding)
            if      (_cmd === 0) _reg = _val;
            else if (_cmd === 1) _reg += _val;
            else if (_cmd === 2) _reg -= _val;
            else if (_cmd === 3) { 
                // Giải mã dữ liệu và xuất trực tiếp ra luồng đồ họa
                _vram += String.fromCharCode(_reg - 99); 
                pc--; // Bù nhịp đếm do lệnh xuất không có tham số giá trị
            }
        }

        _clock += 0.012;
        
        // Vẽ dữ liệu từ VRAM lên Canvas
        _x.fillStyle = `rgba(90, 90, 90, ${0.05 + Math.abs(Math.sin(_clock)) * 0.4})`;
        _x.font = "italic 13px 'Times New Roman', serif"; 
        _x.textAlign = "center"; 
        _x.letterSpacing = "2px";
        _x.fillText(_vram, _W / 2, _H / 2);
        
        _vram = null; // Quét sạch VRAM sau mỗi khung hình

        // Trạng thái hệ thống mã hóa
        _x.fillStyle = `rgba(30, 30, 30, ${0.1 + Math.sin(_clock * 2) * 0.1})`;
        _x.font = "9px monospace";
        _x.fillText("V-CPU_EXECUTION_STATE_LOCKED", _W / 2, _H - 40);

        requestAnimationFrame(_executeVM);
    }
    
    _executeVM();
}(window, document);
</script>
</body>
</html>
